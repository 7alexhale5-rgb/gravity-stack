- description: "research-stack produces multi-source report"
  vars:
    topic: "Best practices for LLM prompt caching in production"
  assert:
    - type: contains-any
      value: ["## Sources", "## Findings", "## Summary", "## Recommendations"]
    - type: llm-rubric
      value: "Report should cite multiple sources with confidence ratings and practical recommendations."

- description: "research-stack --youtube discovers relevant content"
  vars:
    topic: "Claude Code advanced workflows. Mode: --youtube"
  assert:
    - type: llm-rubric
      value: "Should include YouTube video references with titles, channels, and relevance ratings."

- description: "research-stack --validate catches citation issues"
  vars:
    topic: "React Server Components performance benchmarks. Mode: --validate"
  assert:
    - type: llm-rubric
      value: "Should flag unverifiable claims and include a validation summary section."
