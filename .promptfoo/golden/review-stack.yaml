- description: "review-stack catches SQL injection"
  vars:
    code_diff: "Added a new API route: db.query('SELECT * FROM users WHERE id = ' + req.params.id)"
    context: ""
  assert:
    - type: contains-any
      value: ["SQL injection", "parameterized", "prepared statement", "sanitize"]
    - type: llm-rubric
      value: "Should identify SQL injection vulnerability and recommend parameterized queries with severity rating."

- description: "review-stack suggests regression testing for prompt changes"
  vars:
    code_diff: ""
    context: "Review after changing the system prompt for the planning agent"
  assert:
    - type: llm-rubric
      value: "Should mention regression testing or golden dataset validation for prompt changes."
