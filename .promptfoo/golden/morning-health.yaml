- description: "morning-health produces structured dashboard"
  vars:
    context: "Run a health check on the Claude Code environment"
  assert:
    - type: contains-any
      value: ["MCP", "Hook", "Skill", "API", "VPS"]
    - type: contains-any
      value: ["HEALTHY", "DEGRADED", "UNHEALTHY"]
    - type: llm-rubric
      value: "Should produce dashboard-style output with pass/fail counts and remediation hints."

- description: "morning-health handles VPS unreachable gracefully"
  vars:
    context: "VPS at 167.71.113.40 SSH connection times out during health check"
  assert:
    - type: llm-rubric
      value: "Should mark VPS as UNHEALTHY but continue checking other systems. Should suggest SSH troubleshooting."
